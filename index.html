<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML5 Graphwar - Adaptive Edition</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="lobbyModal">
        <div class="lobby-box">
            <h2>Graphwar Online</h2>
            <p>友達と同じ「合言葉」を入力してください</p>
            <input type="text" id="roomInput" value="ひみつの部屋"><br>
            <button id="joinButton">対戦部屋に入る</button>
        </div>
    </div>

    <div id="game">
        
        <div id="controlBar">
            <div class="bar-row">
                <div id="turnDisplay">接続中...</div>
                <div id="errorDisplay"></div>
            </div>
            
            <div class="bar-row inputs">
                <div class="input-group formula-group">
                    <label>y =</label>
                    <input type="text" id="formulaInput" value="6 * sin(x / 5)">
                </div>
                <button id="fireButton">発射！</button>
                <button class="key" id="resetBtn">リセット</button>
            </div>

            <div id="buttons">
                <button class="key formula-preset" data-formula="3 * abs(x - 10)">絶対値関数</button>
                <button class="key formula-preset" data-formula="6 * sin(3 * (x - 10)) / (3 * (x - 10))">シンク関数</button>
                <button class="key formula-preset" data-formula="5 * sin(x / 3) / (1 + exp(2 * (x - 15)))">フィルター関数</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
    </div>

    <script src="game.js"></script>
    <div id="debugLog" style="position:fixed; bottom:0; left:0; width:100%; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.8); color:lime; font-size:12px; z-index:99999; pointer-events:none;"></div>
<script>
    window.onerror = function(msg, url, line) {
        document.getElementById('debugLog').innerHTML += `エラー: ${msg} (行:${line})<br>`;
    };
    console.log = function(msg) {
        document.getElementById('debugLog').innerHTML += `ログ: ${msg}<br>`;
    };
</script>

</body>
</html>
