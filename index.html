<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML5 Graphwar - Adaptive Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="lobbyModal">
        <div class="lobby-box">
            <h2>Graphwar Online</h2>
            <p>友達と同じ「合言葉」を入力してください</p>
            <input type="text" id="roomInput" value="ひみつの部屋"><br>
            <button id="joinButton">対戦部屋に入る</button>
        </div>
    </div>

    <div id="game">
        <div id="controlBar">
            <div class="bar-row">
                <div id="turnDisplay">接続中...</div>
                <div id="errorDisplay"></div>
            </div>
            
            <div class="bar-row inputs">
                <div class="input-group formula-group">
                    <label>y =</label>
                    <input type="text" id="formulaInput" value="6 * sin(x / 5)">
                </div>
                <button id="fireButton">発射！</button>
                <button class="key" id="resetBtn">リセット</button>
            </div>

            <div id="buttons">
                <button class="key formula-preset" data-formula="3 * abs(x - 10)">絶対値関数</button>
                <button class="key formula-preset" data-formula="6 * sin(3 * (x - 10)) / (3 * (x - 10))">シンク関数</button>
                <button class="key formula-preset" data-formula="5 * sin(x / 3) / (1 + exp(2 * (x - 15)))">フィルター関数</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>

    <div id="debugLog" style="position:fixed; top:0; left:0; width:100%; max-height:100px; overflow-y:auto; background:rgba(0,0,0,0.85); color:#00ff00; font-size:11px; z-index:999999; pointer-events:none; border-bottom:1px solid #00ff00; font-family:monospace; padding:5px;">[Debug Console] 起動しました。ログを待機中...</div>
    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('debugLog').innerHTML += `<br><span style="color:#ff3333;font-weight:bold;">❌エラー: ${msg} (行:${line})</span>`;
            return false;
        };
        console.log = function(msg) {
            document.getElementById('debugLog').innerHTML += `<br>ℹ️ログ: ${msg}`;
        };
        // ボタンが押されたことを強制検知するテスト
        window.addEventListener('load', () => {
            const btn = document.getElementById('joinButton');
            if(btn) {
                btn.addEventListener('click', () => {
                    document.getElementById('debugLog').innerHTML += `<br>🔘ボタン押下を検知しました！`;
                });
            } else {
                document.getElementById('debugLog').innerHTML += `<br><span style="color:yellow;">⚠️joinButtonが見つかりません</span>`;
            }
        });
    </script>
</body>
</html>
