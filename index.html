<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML5 Graphwar - Adaptive Edition</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="lobbyModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999;">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center; color: black;">
            <h2>Graphwar オンライン対戦</h2>
            <p>友達と同じ「合言葉」を入力してください</p>
            <input type="text" id="roomInput" value="ひみつの部屋" style="font-size: 18px; padding: 10px; width: 200px; text-align: center;"><br><br>
            <button id="joinButton" style="font-size: 18px; padding: 10px 20px; cursor: pointer;">対戦部屋に入る</button>
        </div>
    </div>

    <div id="game">
        
        <div id="controlBar">
            <div class="bar-row">
                <div id="turnDisplay">接続中...</div>
                <div id="errorDisplay"></div>
            </div>
            
            <div class="bar-row inputs">
                <div class="input-group formula-group">
                    <label>y =</label>
                    <input type="text" id="formulaInput" value="6 * sin(x / 5)">
                </div>
                <button id="fireButton">発射！</button>
                <button class="key" id="resetBtn">リセット</button>
            </div>

            <div id="buttons">
                <button class="key formula-preset" data-formula="3 * abs(x - 10)">絶対値関数</button>
                <button class="key formula-preset" data-formula="6 * sin(3 * (x - 10)) / (3 * (x - 10))">シンク関数</button>
                <button class="key formula-preset" data-formula="5 * sin(x / 3) / (1 + exp(2 * (x - 15)))">フィルター関数</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
    </div>

    <script src="game.js"></script>
</body>
</html>
