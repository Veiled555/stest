<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML5 Graphwar - Adaptive Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div id="lobbyModal" class="modal-layer">
        <div class="lobby-box">
            <h2>Graphwar Online</h2>
            <p>友達と同じ「合言葉」を入力してください</p>
            <input type="text" id="roomInput" value="ひみつの部屋"><br>
            <button id="joinButton">対戦部屋に入る</button>
        </div>
    </div>

    <div id="resultModal" class="modal-layer" style="display: none;">
        <div class="lobby-box">
            <h2 id="resultTitle">GAME OVER</h2>
            <p id="resultMessage">対戦が終了しました</p>
            <button id="rematchButton" style="margin-bottom: 10px; background: #4a7c59;">もう一度対戦（再戦）</button>
            <button id="leaveButton" style="background: #444;">最初の画面へ戻る</button>
        </div>
    </div>

    <div id="game">
        <div id="controlBar">
            <div class="bar-row">
                <div id="turnDisplay">接続中...</div>
                <div id="errorDisplay"></div>
            </div>
            
            <div class="bar-row inputs">
<div class="input-group formula-group">
    <label>y =</label>
    <input type="text" id="formulaInput" value="6 * sin(x / 5)">
</div>

<div class="input-group angle-group" style="margin-left: 10px;">
    <label>角度:</label>
    <input type="number" id="angleInput" value="0" style="width: 50px; background: #222; color: #fff; border: 1px solid #555; text-align: center; border-radius: 4px;">
    <span style="color: #aaa; font-size: 12px; margin-left: 2px;">°</span>
</div>

<button id="fireButton">発射！</button>

                </div>

            <div id="buttons">
                <button class="key formula-preset" data-formula="3 * abs(x - 10)">絶対値関数</button>
                <button class="key formula-preset" data-formula="6 * sin(3 * (x - 10)) / (3 * (x - 10))">シンク関数</button>
                <button class="key formula-preset" data-formula="5 * sin(x / 3) / (1 + exp(2 * (x - 15)))">フィルター関数</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>
<!--
    <div id="debugLog">[Debug Console] 起動しました。testログを待機中...</div>
-->
    <script src="game.js"></script>

</body>
</html>
